name: naivisense
description: AI-powered therapy coordination platform for children.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management & routing
  flutter_riverpod: ^2.5.1
  go_router: ^13.2.4

  # Networking
  dio: ^5.4.3

  # Storage
  flutter_secure_storage: ^9.0.0
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.3

  # UI
  google_fonts: ^6.1.0
  fl_chart: ^0.68.0
  cached_network_image: ^3.3.1
  lottie: ^3.1.2

  # Media & utils
  image_picker: ^1.1.2
  intl: ^0.19.0
  connectivity_plus: ^6.0.3
  file_picker: ^11.0.2
  intl_phone_field: ^3.2.0
  flutter_staggered_grid_view: ^0.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
